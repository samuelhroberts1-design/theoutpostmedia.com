<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Press Check — Outpost Media</title>
  <meta name="description" content="Media criticism focused on narratives, framing, omissions, and incentives — treating journalism itself as an institution worthy of scrutiny.">
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="presscheck">

  <header id="site-nav"></header>

  <div class="page-header">
    <div class="container fade-up">
      <div class="stream-color-bar" style="background:var(--presscheck)"></div>
      <p class="eyebrow" style="color:var(--presscheck);margin-bottom:0.75rem">Content Stream</p>
      <h1>Press Check</h1>
      <p>Media criticism focused on narratives, framing, omissions, and incentives. This is not anti-media — it is media-aware, treating journalism itself as an institution worthy of scrutiny, with a particular focus on the ABC.</p>
    </div>
  </div>

  <main class="stream-articles container">
    <div class="articles-grid" id="articles-grid">
      <div class="loading-state"><span class="loading-dots">Loading</span></div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="app.js"></script>
  <script>
    async function loadStream() {
      const grid = document.getElementById('articles-grid');
      const items = await fetchRSS();
      if (!items) { grid.innerHTML = renderError(); return; }
      const filtered = filterByStream(items, 'presscheck');
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="loading-state">No Press Check pieces yet — <a href="${CONFIG.substackUrl}" target="_blank" style="color:var(--gold)">check Substack</a><br><br><small style="font-size:0.7rem;color:var(--text-muted)">Tip: tag your Substack posts with "Press Check" to display them here automatically.</small></div>`;
      } else {
        grid.innerHTML = filtered.map(item => renderCard(item, { streamKey: 'presscheck' })).join('');
      }
    }
    loadStream();
  </script>
</body>
</html>
